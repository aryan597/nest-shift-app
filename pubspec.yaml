name: nestshift_flutter
description: "NestShift — Privacy-first Smart Home Controller"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  
  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5
  
  # Navigation
  go_router: ^14.2.7
  
  # Networking
  dio: ^5.6.0
  web_socket_channel: ^3.0.1
  
  # UI & Design
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.2
  fl_chart: ^0.68.0
  percent_indicator: ^4.2.3
  shimmer: ^3.0.0
  
  # Device features
  mobile_scanner: ^5.2.3
  speech_to_text: ^7.0.0
  shared_preferences: ^2.3.1
  
  # Utilities
  intl: ^0.19.0
  json_annotation: ^4.9.0
  freezed_annotation: ^2.4.1
  equatable: ^2.0.5
  uuid: ^4.4.2
  timeago: ^3.7.0
  connectivity_plus: ^6.0.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.11
  json_serializable: ^6.8.0
  freezed: ^2.5.2
  riverpod_generator: ^2.4.0

flutter:
  uses-material-design: true
